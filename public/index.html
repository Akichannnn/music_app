<!DOCTYPE html>
<html lang="en">
<head>
  <!--===meta==-->
  <meta charset="UTF-8">

  <!--==link==-->

  href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
  />
  <link rel="icon" type="image/png" zise="32x32" href="downloads/icon.png">
  <link rel="stylesheet" href="css/style.css">
 <link rel="stylesheet" href="css/homecss.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/setting.css">
  <link rel="stylesheet" href="css/library.css">
  <!--==script link==-->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script
src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <script src="https://kit.fontawesome.com/860e7596f3.js"></script><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://unpkg.com/boxicons@2.1.2/dist/boxicons.js"></script>
</head>
<body>
  <main class="music-player" id="music-player">
    <!--===== music player =====-->
    <div class="audio-container">
    <button id='btn-plus' class="btn plus">
          <i id="plus" class="fa-solid fa-plus"></i>
        </button>
        <div class="Singer">
         <h2 class="audio-title">Title of audio</h2>
        <h6 class="audio-singer">Singer name</h6>
        </div>
      <div class="audio-img-wrapper">
        <div class="audio-img">
          <img class="img">
        </div>
      </div>
      <div class="audio-progress">
          <input value="0" min="0" max="100" class="progress_test" type="range" step="1">
        <div class="current-time">
          00:00
        </div>
        <div class="duration">
          00:00
        </div>
      </div>
      <div class="audio-btns">
        <!-- <button class="btn shuffle">
                        <i class="fa-solid fa-shuffle"></i>
                    </button> -->
        <button  class="btn random">
          <i id="random" class="fa-solid fa-shuffle"></i>
        </button>
        <button class="btn skip-back">
          <i class="fa-solid fa-backward-step fa-1x"></i>
        </button>
        <button class="btn-p play">
         <i class="fa-solid fa-play fa-2x"></i>
        </button>

        <button  class="btn skip-forward">
          <i class="fa-solid fa-forward-step fa-1x"></i>
        </button>
         <button class="btn replay">
          <i id="replay" class="fa-solid fa-rotate"></i>
        </button>
        <!-- <button class="btn repeat">
                        <i class="fa-solid fa-repeat"></i>
                    </button> -->
      </div>
      <div>
        <button id="menu">
          <i class="fa-solid fa-chevron-down"></i>
        </button>
      </div>
    </div>
  </main>
  <!--===== giao dien=====-->
  <header class="giao-dien">
    <nav class='thanh-cc'>
      <button class="icon-home">
         <i id="i-1" class="ti ti-home-filled"></i>
      </button>
      <button class="icon-search">
       <i id="i-2" class="ti ti-search"></i>
      </button>
      <button class="icon-library">
          <i id="i-3" class="ti ti-books"></i>
      </button>
       <button id="btn-play">
          <i id="pause" class="fa-solid fa-play fa-2x"></i>
          <i id="playtracks" class="fa-solid fa-pause fa-2x"></i>
      </button>
      <div class="menu-nhac">
      <div class="menu-phat-nhac">
      </div>
    </div>
    </nav>
  </header>
  <nav class="control">
    <img class="user-icon" src="downloads/icon.png">
    <h4 class="h4-1">good morning!</h4>
    <p class="tat-ca">
      tất cả
    </p>
    <p class="nhac-nhe">
      nhạc nhẹ
    </p>
    <p class="nhac-remix">
      nhạc remix
    </p>
  </nav>
  <!--===login.html===-->
  <div class="loginhtml"></div>
   <!--===setting.html===-->
  <div class="settinghtml"></div>
 <!--===home.html===-->
  <div class="homehtml"></div>
  <!--===search.html===-->
  <div class="searchhtml"></div>
  <!--===search.html===-->
  <div class="libraryhtml"></div>
  <!--===== MAIN JS=====-->
  <script async src="js/main.js"></script>
</body>
</html>
